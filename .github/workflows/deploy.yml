name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '24'
  TERRAFORM_VERSION: '1.5.0'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: ./terraform

      - name: Terraform init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: ./terraform

  plan-and-apply:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build
        env:
          VITE_SKILL_API_URL: https://skills.eastern-shore-solutions.com/api

      - name: Terraform init
        run: terraform init
        working-directory: ./terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import existing resources
        run: |
          chmod +x import-resources.sh
          ./import-resources.sh
        working-directory: ./terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_pages_project_name: skill-builder-landing

      - name: Terraform plan
        run: terraform plan -out=tfplan
        working-directory: ./terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
        working-directory: ./terraform
        env:
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Export deployment config
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          chmod +x export-config.sh
          ./export-config.sh
        working-directory: ./terraform

      - name: Install Wrangler
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm install -g wrangler

      - name: Deploy Workers script with KV bindings
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Get KV namespace ID from Terraform state
          KV_NAMESPACE_ID=$(terraform output -raw kv_namespace_id 2>/dev/null || echo "")
          
          if [ -z "$KV_NAMESPACE_ID" ]; then
            echo "Warning: Could not get KV namespace ID from Terraform state"
            exit 1
          fi
          
          # Deploy Workers script with KV binding
          wrangler deploy worker/skill-persistence-worker.js \
            --name skill-builder-landing-api \
            --env production
        working-directory: ./
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          wrangler pages deploy packages/web/dist \
            --project-name skill-builder-landing \
            --branch main
        working-directory: ./
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

