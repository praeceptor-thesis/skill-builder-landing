name: Publish skill-builder MCP

# Publishes @dmzagent/skill-builder-mcp (packages/mcp) to npm AND lists it in the
# official MCP Registry (https://registry.modelcontextprotocol.io) under the
# domain-based name com.dmzagent/skill-builder-mcp.
#
# Trigger: push a version tag (git tag v1.0.1 && git push origin v1.0.1).
# Also runnable manually (workflow_dispatch) with an optional dry run.
#
# Required repo secrets:
#   NPM_TOKEN        npm automation token with publish rights to the @dmzagent scope
#                    (the same token stored in .npm-private).
#   MCP_PRIVATE_KEY  Ed25519 private key (hex) whose PUBLIC half is published as the
#                    apex TXT record on dmzagent.com (see terraform/mcp-registry.tf).
#
# The npm publish is version-guarded (skips if the version is already on npm), so
# re-running the workflow to retry the registry step is safe.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and pack only — publish nothing'
        type: boolean
        default: false

concurrency:
  group: publish-mcp
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '24'
  MCP_DOMAIN: 'dmzagent.com'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@dmzagent'

      - name: Install dependencies
        run: npm ci

      - name: Build the MCP package
        run: npm run build --workspace @dmzagent/skill-builder-mcp

      - name: Determine npm version state
        id: ver
        working-directory: packages/mcp
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "@dmzagent/skill-builder-mcp@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::npm already has @dmzagent/skill-builder-mcp@$VERSION — skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack (dry run)
        if: inputs.dry_run == true
        run: npm publish --dry-run --access public --workspace @dmzagent/skill-builder-mcp

      - name: Publish package to npm
        if: inputs.dry_run != true && steps.ver.outputs.exists == 'false'
        run: npm publish --access public --workspace @dmzagent/skill-builder-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        if: inputs.dry_run != true
        working-directory: packages/mcp
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version to package.json
        if: inputs.dry_run != true
        working-directory: packages/mcp
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v | (.packages[].version) |= $v' server.json > "$tmp" && mv "$tmp" server.json

      - name: Authenticate to MCP Registry (DNS)
        if: inputs.dry_run != true
        working-directory: packages/mcp
        run: ./mcp-publisher login dns --domain "$MCP_DOMAIN" --private-key "${{ secrets.MCP_PRIVATE_KEY }}"

      - name: Publish to MCP Registry
        if: inputs.dry_run != true
        working-directory: packages/mcp
        run: ./mcp-publisher publish
