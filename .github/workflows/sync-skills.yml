name: Imagine & publish skills

# The "claw": on a schedule it invents brand-new skills with the registry AI,
# commits them to skills/ as a durable record, then publishes them.
on:
  schedule:
    # Daily at 09:00 UTC. Adjust the cron as you like.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'How many new skills to invent'
        type: string
        default: '1'
      dry_run:
        description: 'Invent and print only — save and publish nothing'
        type: boolean
        default: false

# Never let two runs collide (they both push commits / publish).
concurrency:
  group: imagine-skills
  cancel-in-progress: false

permissions:
  contents: write   # to commit invented skills back to skills/

env:
  NODE_VERSION: '24'
  COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.count || '1' }}
  # Fraction of invented skills that should be meta (bundling existing skills).
  # Automatically falls back to basic until at least two skills exist.
  META_RATIO: '0.3'

jobs:
  imagine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      # --- Dry run: invent and print, change nothing ---
      - name: Invent skills (dry-run preview)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: node packages/cli/dist/index.js generate --count "$COUNT" --dry-run --registry "$SKILL_API_URL"
        env:
          SKILL_API_URL: ${{ vars.SKILL_API_URL || 'https://skills.eastern-shore-solutions.com/api' }}

      # --- Real run: invent -> write manifests -> commit -> publish ---
      - name: Check auth token
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          if [ -z "${{ secrets.SKILL_TOKEN }}" ]; then
            echo "::error::SKILL_TOKEN secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Invent skills and write manifests
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          node packages/cli/dist/index.js generate \
            --count "$COUNT" \
            --meta-ratio "$META_RATIO" \
            --no-publish \
            --out ./skills \
            --registry "$SKILL_API_URL"
        env:
          SKILL_API_URL: ${{ vars.SKILL_API_URL || 'https://skills.eastern-shore-solutions.com/api' }}

      - name: Commit invented skills
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: |
          git config user.name "skill-claw[bot]"
          git config user.email "skill-claw@users.noreply.github.com"
          git add skills/
          if git diff --cached --quiet; then
            echo "No new skills to commit."
          else
            git commit -m "skills: imagine $(git diff --cached --name-only | grep -c '^skills/.*\.json$') new skill(s) [skip ci]"
            git push
          fi

      - name: Publish skills
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        run: node packages/cli/dist/index.js sync ./skills --registry "$SKILL_API_URL"
        env:
          SKILL_TOKEN: ${{ secrets.SKILL_TOKEN }}
          SKILL_API_URL: ${{ vars.SKILL_API_URL || 'https://skills.eastern-shore-solutions.com/api' }}
